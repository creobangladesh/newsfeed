<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amer's News</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>

    <style>
        /* Shadcn-inspired CSS Variables */
        :root {
            --background: #ffffff;
            --foreground: #09090b;
            --muted: #f4f4f5;
            --muted-foreground: #71717a;
            --border: #e4e4e7;
            --accent: #f4f4f5;
            --accent-foreground: #18181b;
            --radius: 0.3rem;
        }

        [data-theme="dark"] {
            --background: #09090b;
            --foreground: #fafafa;
            --muted: #27272a;
            --muted-foreground: #a1a1aa;
            --border: #27272a;
            --accent: #27272a;
            --accent-foreground: #fafafa;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--background); color: var(--foreground); transition: background 0.2s, color 0.2s; line-height: 1.5; }
        
        .container { margin: 0 auto; width: 95%; padding: 15px 0; max-width: 1400px; }
        @media (min-width: 1024px) { .container { width: 85%; } }

        /* NYT Minimal Header */
        header { border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 15px; }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        
        .brand-zone { display: flex; align-items: center; gap: 12px; }
        .logo { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
        h1 { font-size: 1.25rem; font-weight: 800; letter-spacing: -0.02em; }
        .brand-meta { font-size: 0.75rem; color: var(--muted-foreground); margin-top: 2px; }

        .utility-zone { display: flex; align-items: center; gap: 15px; font-size: 0.8rem; font-weight: 500; color: var(--muted-foreground); }
        .live-clock { display: none; text-transform: uppercase; letter-spacing: 0.05em; }
        @media (min-width: 768px) { .live-clock { display: block; } }

        /* Icon Buttons (Search, Theme, Bookmarks) */
        .icon-btn { background: none; border: none; color: var(--foreground); cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 4px; border-radius: var(--radius); transition: background 0.2s; opacity: 0.7; }
        .icon-btn:hover { background: var(--accent); opacity: 1; }
        .icon-btn.active { opacity: 1; }
        .icon-btn svg { width: 18px; height: 18px; }

        /* Search Dropdown */
        #search-container { display: none; padding: 10px 0; border-bottom: 1px solid var(--border); margin-bottom: 15px; }
        .search-box { width: 100%; padding: 10px 12px; border: 1px solid var(--border); background: var(--background); color: var(--foreground); font-family: inherit; border-radius: var(--radius); outline: none; font-size: 0.9rem; }
        .search-box:focus { border-color: var(--muted-foreground); }

        /* Controls Area */
        .controls-row { display: flex; flex-wrap: wrap; gap: 10px; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 0.85rem; }
        .select-box { padding: 6px 10px; border: 1px solid var(--border); background: var(--background); color: var(--foreground); border-radius: var(--radius); outline: none; cursor: pointer; font-family: inherit; }
        
        .view-toggles { display: flex; gap: 5px; background: var(--muted); padding: 4px; border-radius: var(--radius); }
        .view-btn { background: transparent; border: none; padding: 4px 8px; border-radius: var(--radius); cursor: pointer; color: var(--muted-foreground); font-size: 0.8rem; font-weight: 600; transition: all 0.2s; }
        .view-btn.active { background: var(--background); color: var(--foreground); box-shadow: 0 1px 2px rgba(0,0,0,0.05); }

        /* Tight Filter Accordion */
        .filter-accordion { border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 20px; font-size: 0.85rem; }
        .filter-accordion summary { padding: 10px 15px; font-weight: 600; cursor: pointer; list-style: none; display: flex; justify-content: space-between; align-items: center; background: var(--muted); }
        .filter-accordion summary::-webkit-details-marker { display: none; }
        .filter-accordion summary:after { content: "+ Expand Filters"; font-size: 0.75rem; color: var(--muted-foreground); }
        .filter-accordion[open] summary:after { content: "- Collapse"; }
        .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; padding: 12px 15px; background: var(--background); }
        
        .capsule { background: var(--muted); color: var(--foreground); border: 1px solid transparent; padding: 4px 12px; border-radius: 99px; cursor: pointer; font-size: 0.8rem; font-weight: 500; transition: all 0.2s; }
        .capsule:hover { border-color: var(--border); }
        .capsule.active { background: var(--foreground); color: var(--background); }

        /* Layout Systems */
        .layout-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 768px) { .layout-grid { grid-template-columns: repeat(3, 1fr); gap: 25px; } }
        @media (min-width: 1024px) { .layout-grid { grid-template-columns: repeat(4, 1fr); } }
        
        .layout-masonry { column-count: 1; column-gap: 25px; }
        @media (min-width: 768px) { .layout-masonry { column-count: 3; } }
        @media (min-width: 1024px) { .layout-masonry { column-count: 4; } }
        .layout-masonry .news-card { break-inside: avoid; margin-bottom: 25px; }

        .layout-list { display: flex; flex-direction: column; gap: 15px; }
        
        /* Drudge-style Text Layout */
        .layout-text { display: flex; flex-direction: column; gap: 0; }

        /* Standard Card Aesthetics */
        .news-card { display: flex; flex-direction: column; transition: opacity 0.3s; }
        .news-card.read { opacity: 0.6; }
        
        .card-image-wrap { position: relative; width: 100%; height: 200px; margin-bottom: 12px; background: var(--muted); border-radius: var(--radius); overflow: hidden; }
        .news-image { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .tag { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; padding: 2px 8px; border-radius: var(--radius); cursor: pointer; border: 1px solid var(--border); background: var(--muted); color: var(--foreground); }
        
        /* Bookmark SVG Icon styling */
        .bookmark-btn { background: none; border: none; cursor: pointer; color: var(--muted-foreground); display: flex; align-items: center; transition: color 0.2s; }
        .bookmark-btn:hover { color: var(--foreground); }
        .bookmark-btn.saved { color: #2563eb; } /* Blue filled state */

        .news-title { display: block; color: var(--foreground); text-decoration: none; font-size: 1.05rem; font-weight: 700; line-height: 1.3; margin-bottom: 8px; }
        .news-title:hover { text-decoration: underline; }
        
        .snippet { font-size: 0.85rem; color: var(--muted-foreground); margin-bottom: 12px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        
        .meta { color: var(--muted-foreground); font-size: 0.75rem; display: flex; justify-content: space-between; align-items: center; }
        
        /* List Mode Adjustments */
        @media (min-width: 768px) {
            .layout-list .news-card { flex-direction: row; gap: 20px; align-items: flex-start; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
            .layout-list .card-image-wrap { width: 280px; height: 160px; flex-shrink: 0; margin-bottom: 0; }
        }

        /* Text Mode Adjustments (Drudge Style) */
        .layout-text .news-card { flex-direction: column; padding: 10px 0; border-bottom: 1px solid var(--border); gap: 4px; }
        .layout-text .card-image-wrap { display: none; }
        .layout-text .card-header { display: none; }
        .layout-text .news-title { font-size: 1rem; font-weight: 500; display: inline; margin: 0; }
        .layout-text .snippet { font-size: 0.8rem; margin: 4px 0 0 0; -webkit-line-clamp: 2; }
        .layout-text .meta { font-size: 0.7rem; margin-top: 4px; }

        /* --- HERO CARD (Grid View Only) --- */
        .layout-grid .hero-card { grid-column: 1 / -1; position: relative; height: 450px; border-radius: var(--radius); overflow: hidden; margin-bottom: 10px; display: flex; flex-direction: column; justify-content: flex-end; padding: 0; }
        .hero-card .card-image-wrap { position: absolute; top: 0; left: 0; width: 100%; height: 100%; margin: 0; border-radius: 0; z-index: 1; }
        .hero-card .news-image { object-fit: cover; }
        .hero-card .hero-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, transparent 20%, rgba(0,0,0,0.85) 100%); z-index: 2; }
        
        .hero-card .news-content { position: relative; z-index: 3; padding: 25px; display: flex; flex-direction: column; gap: 10px; }
        /* Force dark theme text colors for hero overlay so it's always readable */
        .hero-card .tag { background: rgba(255,255,255,0.2); border: none; color: white; }
        .hero-card .news-title { color: #ffffff; font-size: 1.5rem; font-weight: 800; max-width: 100%; }
        .hero-card .snippet { color: #d4d4d8; font-size: 0.95rem; max-width: 100%; -webkit-line-clamp: 2; }
        .hero-card .meta, .hero-card .bookmark-btn { color: #a1a1aa; }
        
        @media (min-width: 768px) {
            .hero-card .news-content { flex-direction: row; align-items: flex-end; justify-content: space-between; padding: 35px; gap: 30px; }
            .hero-card .hero-text-block { flex: 1; max-width: 65%; }
            .hero-card .news-title { font-size: 2.2rem; }
            .hero-card .snippet { -webkit-line-clamp: 3; }
            .hero-card .hero-meta-block { display: flex; flex-direction: column; align-items: flex-end; gap: 15px; }
        }

        /* Pagination & Footer */
        .load-more { display: block; width: 100%; padding: 12px; margin-top: 30px; background: var(--background); color: var(--foreground); border: 1px solid var(--border); border-radius: var(--radius); font-weight: 600; cursor: pointer; transition: background 0.2s; font-size: 0.9rem; }
        .load-more:hover { background: var(--muted); }
        
        footer { text-align: center; padding: 40px 0; margin-top: 40px; border-top: 1px solid var(--border); color: var(--muted-foreground); font-size: 0.85rem; }
        footer a { color: var(--foreground); text-decoration: underline; font-weight: 500; }
    </style>
</head>
<body>
    <div class="container">
        
        <header>
            <div class="header-top">
                <div class="brand-zone">
                    <img src="https://amerhabib.com/wp-content/uploads/2023/03/new_me.jpg" alt="Logo" class="logo">
                    <div>
                        <h1>Amer's News</h1>
                        <div class="brand-meta" id="sync-status">Fetching latest data...</div>
                    </div>
                </div>
                
                <div class="utility-zone">
                    <div id="live-datetime" class="live-clock"></div>
                    <button class="icon-btn" onclick="toggleSearch()" title="Search">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    </button>
                    <button id="theme-btn" class="icon-btn" onclick="toggleTheme()" title="Toggle Theme">
                        </button>
                </div>
            </div>
        </header>

        <div id="search-container">
            <input type="text" id="search-box" class="search-box" placeholder="Search articles, keywords..." oninput="handleSearch()">
        </div>

        <div class="controls-row">
            <select id="sort-box" class="select-box" onchange="handleSort()">
                <option value="newest">Sort: Newest</option>
                <option value="oldest">Sort: Oldest</option>
                <option value="bookmarks">View Saved</option>
            </select>
            
            <div class="view-toggles">
                <button class="view-btn active" id="view-grid" onclick="setView('grid')">Grid</button>
                <button class="view-btn" id="view-masonry" onclick="setView('masonry')">Masonry</button>
                <button class="view-btn" id="view-list" onclick="setView('list')">List</button>
                <button class="view-btn" id="view-text" onclick="setView('text')">Text</button>
            </div>
        </div>

        <details class="filter-accordion" id="filter-details">
            <summary>Categories & Topics</summary>
            <div id="filter-container" class="filter-bar">
                </div>
        </details>

        <div id="news-container" class="layout-grid"></div>
        
        <button id="load-more-btn" class="load-more" onclick="loadMore()" style="display: none;">Load Older Articles ↓</button>

        <footer>
            Built with ♥ by <a href="https://amerhabib.com/" target="_blank" rel="noopener">Amer Habib</a>
        </footer>

    </div>

    <script>
        // State Management
        let globalData = [];
        let filteredData = [];
        let itemsPerPage = 13; 
        let currentDisplayed = itemsPerPage;
        let currentView = 'grid';
        
        // Local Storage State
        let readArticles = JSON.parse(localStorage.getItem('readArticles') || '[]');
        let bookmarks = JSON.parse(localStorage.getItem('bookmarks') || '[]');

        // SVGs
        const svgSun = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>`;
        const svgMoon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>`;
        const svgBookmarkEmpty = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg>`;
        const svgBookmarkFilled = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg>`;

        function updateClock() {
            const now = new Date();
            const options = { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
            document.getElementById('live-datetime').innerText = now.toLocaleDateString('en-US', options);
        }
        setInterval(updateClock, 60000); updateClock();

        function setupThemeIcon() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            document.getElementById('theme-btn').innerHTML = isDark ? svgSun : svgMoon;
        }
        setupThemeIcon();

        window.toggleTheme = function() {
            const current = document.documentElement.getAttribute('data-theme');
            const target = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', target);
            localStorage.setItem('theme', target);
            setupThemeIcon();
        }

        window.toggleSearch = function() {
            const el = document.getElementById('search-container');
            if (el.style.display === 'block') {
                el.style.display = 'none';
            } else {
                el.style.display = 'block';
                document.getElementById('search-box').focus();
            }
        }

        function getRelativeTime(dateStr) {
            const diffSecs = Math.floor((new Date() - new Date(dateStr)) / 1000);
            const diffMins = Math.floor(diffSecs / 60);
            const diffHours = Math.floor(diffMins / 60);
            const diffDays = Math.floor(diffHours / 24);

            if (diffSecs < 60) return "Just now";
            if (diffMins < 60) return `${diffMins} min ago`;
            if (diffHours < 24) return `${diffHours} hr ago`;
            if (diffDays === 1) return "Yesterday";
            return `${diffDays} days ago`;
        }

        window.setView = function(viewType) {
            currentView = viewType;
            document.getElementById('news-container').className = `layout-${viewType}`;
            document.querySelectorAll('.view-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`view-${viewType}`).classList.add('active');
            renderArticles(); 
        }

        function setupFilters() {
            const container = document.getElementById('filter-container');
            container.innerHTML = `<button class="capsule active" onclick="filterCategory('All', this)">All</button>`;
            
            const categories = [...new Set(globalData.map(item => item.category))];
            categories.forEach(cat => {
                container.innerHTML += `<button class="capsule" onclick="filterCategory('${cat}', this)">${cat}</button>`;
            });
        }

        window.filterCategory = function(category, btnElement) {
            document.querySelectorAll('.capsule').forEach(b => b.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');
            else {
                document.querySelectorAll('.capsule').forEach(b => {
                    if (b.innerText.includes(category) || (category === 'All' && b.innerText === 'All')) b.classList.add('active');
                });
            }
            document.getElementById('search-box').value = '';
            applyFiltersAndSort();
        }

        window.handleSearch = function() { applyFiltersAndSort(); }
        window.handleSort = function() { applyFiltersAndSort(); }

        function applyFiltersAndSort() {
            const activeBtn = document.querySelector('.capsule.active');
            const category = activeBtn ? activeBtn.innerText.replace(/[^\w\s]/gi, '').trim() : 'All';
            const searchTerm = document.getElementById('search-box').value.toLowerCase();
            const sortMode = document.getElementById('sort-box').value;

            filteredData = globalData;
            if (sortMode === 'bookmarks') {
                filteredData = filteredData.filter(item => bookmarks.includes(item.link));
            } else if (category !== 'All') {
                filteredData = filteredData.filter(item => item.category === category);
            }

            if (searchTerm) {
                filteredData = filteredData.filter(item => item.title.toLowerCase().includes(searchTerm) || (item.snippet && item.snippet.toLowerCase().includes(searchTerm)));
            }

            if (sortMode === 'newest' || sortMode === 'bookmarks') {
                filteredData.sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));
            } else if (sortMode === 'oldest') {
                filteredData.sort((a, b) => new Date(a.pubDate) - new Date(b.pubDate));
            }

            currentDisplayed = itemsPerPage;
            renderArticles();
        }

        window.loadMore = function() {
            currentDisplayed += 12;
            renderArticles();
        }

        window.markRead = function(link) {
            if (!readArticles.includes(link)) {
                readArticles.push(link);
                localStorage.setItem('readArticles', JSON.stringify(readArticles));
                document.getElementById(`card-${btoa(link).replace(/=/g,'')}`).classList.add('read');
            }
        }

        window.toggleBookmark = function(event, link) {
            event.preventDefault();
            const btn = event.currentTarget;
            if (bookmarks.includes(link)) {
                bookmarks = bookmarks.filter(l => l !== link);
                btn.innerHTML = svgBookmarkEmpty;
                btn.classList.remove('saved');
            } else {
                bookmarks.push(link);
                btn.innerHTML = svgBookmarkFilled;
                btn.classList.add('saved');
            }
            localStorage.setItem('bookmarks', JSON.stringify(bookmarks));
            if (document.getElementById('sort-box').value === 'bookmarks') applyFiltersAndSort();
        }

        function buildHeroHtml(item) {
            const isRead = readArticles.includes(item.link);
            const isBookmarked = bookmarks.includes(item.link);
            const cardId = `card-${btoa(item.link).replace(/=/g,'')}`;
            const snippet = item.snippet || '';

            return `
                <div id="${cardId}" class="hero-card ${isRead ? 'read' : ''}">
                    <div class="card-image-wrap">
                        ${item.image ? `<img src="${item.image}" class="news-image">` : ''}
                        <div class="hero-overlay"></div>
                    </div>
                    
                    <div class="news-content">
                        <div class="hero-text-block">
                            <span class="tag" onclick="filterCategory('${item.category}')">${item.category}</span>
                            <a class="news-title" href="${item.link}" target="_blank" onclick="markRead('${item.link}')">${item.title}</a>
                            <div class="snippet">${snippet}</div>
                        </div>
                        
                        <div class="hero-meta-block">
                            <button class="bookmark-btn ${isBookmarked ? 'saved' : ''}" onclick="toggleBookmark(event, '${item.link}')" title="Save">
                                ${isBookmarked ? svgBookmarkFilled : svgBookmarkEmpty}
                            </button>
                            <div class="meta">
                                <span>${getRelativeTime(item.pubDate)}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function buildCardHtml(item) {
            const isRead = readArticles.includes(item.link);
            const isBookmarked = bookmarks.includes(item.link);
            const cardId = `card-${btoa(item.link).replace(/=/g,'')}`;
            const snippet = item.snippet || '';
            
            const imageHtml = item.image 
                ? `<a href="${item.link}" target="_blank" onclick="markRead('${item.link}')" class="card-image-wrap"><img src="${item.image}" alt="Thumbnail" class="news-image" loading="lazy"></a>` 
                : `<div class="card-image-wrap" style="display:flex;align-items:center;justify-content:center;color:var(--muted-foreground);font-size:0.8rem;">No Image</div>`;

            return `
                <div id="${cardId}" class="news-card ${isRead ? 'read' : ''}">
                    ${imageHtml}
                    <div class="news-content">
                        <div class="card-header">
                            <span class="tag" onclick="filterCategory('${item.category}')">${item.category}</span>
                            <button class="bookmark-btn ${isBookmarked ? 'saved' : ''}" onclick="toggleBookmark(event, '${item.link}')" title="Save">
                                ${isBookmarked ? svgBookmarkFilled : svgBookmarkEmpty}
                            </button>
                        </div>
                        <a class="news-title" href="${item.link}" target="_blank" onclick="markRead('${item.link}')">${item.title}</a>
                        <div class="snippet">${snippet}</div>
                        <div class="meta">
                            <span>${getRelativeTime(item.pubDate)}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderArticles() {
            const container = document.getElementById('news-container');
            container.innerHTML = '';

            if (filteredData.length === 0) {
                container.innerHTML = '<p style="color: var(--muted-foreground); padding: 20px;">No articles found.</p>';
                document.getElementById('load-more-btn').style.display = 'none';
                return;
            }

            const itemsToRender = filteredData.slice(0, currentDisplayed);
            let html = '';

            // Apply Hero Logic only on Grid view, newest sort, empty search, All category
            const isDefaultState = (currentView === 'grid' && document.getElementById('search-box').value === '' && document.getElementById('sort-box').value === 'newest');

            if (isDefaultState && itemsToRender.length > 0) {
                html += buildHeroHtml(itemsToRender[0]);
                itemsToRender.slice(1).forEach(item => html += buildCardHtml(item));
            } else {
                itemsToRender.forEach(item => html += buildCardHtml(item));
            }

            container.innerHTML = html;
            document.getElementById('load-more-btn').style.display = (currentDisplayed < filteredData.length) ? 'block' : 'none';
        }

        async function init() {
            try {
                const response = await fetch('./data.json?t=' + new Date().getTime());
                const data = await response.json();
                
                globalData = data.news;
                
                // Format the sync time nicely
                const syncTime = new Date(data.updatedAt).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                document.getElementById('sync-status').innerText = `Updated ${syncTime}`;
                
                if(document.getElementById('filter-container').innerHTML.trim() === "") {
                    setupFilters();
                }
                
                applyFiltersAndSort(); 
            } catch (error) {
                document.getElementById('sync-status').innerText = 'Sync failed. Waiting for runner...';
            }
        }
        
        init();
        setInterval(init, 30 * 60 * 1000); 
    </script>
</body>
</html>
