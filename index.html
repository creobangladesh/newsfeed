<!DOCTYPE html>
<html lang="en">
<head>
    <meta property="og:title" content="Amer.News">
    <meta property="og:description" content="The latest daily news curated and delivered in real-time.">
    <meta property="og:image" content="https://amerhabib.com/wp-content/uploads/2023/03/new_me.jpg">
    <meta property="og:url" content="https://news.amerhabib.com/">
    <meta name="twitter:card" content="summary_large_image">
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amer.News</title>
    <link rel="icon" type="image/jpeg" href="https://amerhabib.com/wp-content/uploads/2023/03/new_me.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
    <style>
        :root { --background: #ffffff; --foreground: #09090b; --muted: #f4f4f5; --muted-foreground: #71717a; --border: #e4e4e7; --radius: 0.3rem; }
        [data-theme="dark"] { --background: #09090b; --foreground: #fafafa; --muted: #27272a; --muted-foreground: #a1a1aa; --border: #27272a; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--background); color: var(--foreground); transition: background 0.2s; }
        .container { margin: 0 auto; width: 95%; max-width: 1600px; padding: 15px 0; }
        @media (min-width: 1024px) { .container { width: 85%; } }
        
        /* Grid Logic */
        .layout-grid-4 { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 640px) { .layout-grid-4 { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1024px) { .layout-grid-4 { grid-template-columns: repeat(4, 1fr); } }

        /* Existing Design Elements */
        .sticky-wrapper { position: sticky; top: 0; background: var(--background); z-index: 1000; border-bottom: 1px solid var(--border); padding: 10px 0; }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .brand-zone { display: flex; align-items: center; gap: 12px; }
        .logo { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
        .utility-zone { display: flex; gap: 10px; }
        .icon-btn { background: none; border: none; cursor: pointer; padding: 6px; }
        
        /* Specific Layouts */
        .layout-list .news-card { display: flex; flex-direction: row; gap: 20px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .layout-text .card-image-wrap { display: none; }
        .news-card { display: flex; flex-direction: column; }
        .card-image-wrap { width: 100%; height: 200px; background: var(--muted); border-radius: var(--radius); overflow: hidden; margin-bottom: 12px; }
        .news-image { width: 100%; height: 100%; object-fit: cover; }
        .news-title { font-weight: 700; color: var(--foreground); text-decoration: none; display: block; margin-bottom: 8px; }
        .load-more { width: 100%; padding: 12px; margin-top: 30px; background: var(--background); border: 1px solid var(--border); cursor: pointer; }
    </style>
</head>
<body>
    <div class="sticky-wrapper"><div class="container"><div class="header-top">
        <div class="brand-zone"><img src="https://amerhabib.com/wp-content/uploads/2023/03/new_me.jpg" class="logo"><h1>Amer.News</h1></div>
        <div class="utility-zone"><button class="icon-btn" onclick="init()">🔄</button><button id="theme-btn" class="icon-btn" onclick="toggleTheme()">🌓</button></div>
    </div></div></div>

    <div class="container">
        <div class="controls-row" style="margin-bottom: 20px;">
            <button onclick="setView('grid-4')">Grid</button>
            <button onclick="setView('list')">List</button>
            <button onclick="setView('text')">Text</button>
        </div>
        <div id="news-container" class="layout-grid-4"></div>
        <button id="load-more-btn" class="load-more" onclick="loadMore()">Load More</button>
    </div>

    <script>
        let globalData = [], filteredData = [];
        // Aligned to rows: Mobile(1), Tablet(2), Desktop(4)
        const getInitialLimit = () => window.innerWidth < 640 ? 4 : (window.innerWidth < 1024 ? 6 : 8);
        const getIncrement = () => window.innerWidth < 640 ? 4 : (window.innerWidth < 1024 ? 2 : 4);
        
        let currentDisplayed = getInitialLimit();
        let currentView = 'grid-4';

        function setView(viewType) {
            currentView = viewType;
            document.getElementById('news-container').className = `layout-${viewType}`;
            renderArticles();
        }

        function loadMore() {
            currentDisplayed += getIncrement();
            renderArticles();
        }

        async function init() {
            try {
                const response = await fetch('./data.json?t=' + new Date().getTime());
                const data = await response.json();
                globalData = data.news || [];
                filteredData = [...globalData];
                renderArticles();
            } catch (e) { console.error(e); }
        }

        function renderArticles() {
            const container = document.getElementById('news-container');
            container.innerHTML = '';
            filteredData.slice(0, currentDisplayed).forEach(item => {
                container.innerHTML += `
                    <div class="news-card">
                        <div class="card-image-wrap"><img src="${item.image}" class="news-image"></div>
                        <div class="news-content">
                            <a class="news-title" href="${item.link}">${item.title}</a>
                        </div>
                    </div>`;
            });
        }
        init();
    </script>
</body>
</html>
