<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amer Habib's News</title>
    
    <link rel="icon" type="image/jpeg" href="https://amerhabib.com/wp-content/uploads/2023/03/new_me.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>

    <style>
        :root { --background: #ffffff; --foreground: #09090b; --muted: #f4f4f5; --muted-foreground: #71717a; --border: #e4e4e7; --accent: #f4f4f5; --radius: 0.3rem; }
        [data-theme="dark"] { --background: #09090b; --foreground: #fafafa; --muted: #27272a; --muted-foreground: #a1a1aa; --border: #27272a; --accent: #27272a; }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--background); color: var(--foreground); transition: background 0.2s, color 0.2s; line-height: 1.5; }
        
        .sticky-header { position: sticky; top: 0; background: var(--background); z-index: 100; border-bottom: 1px solid var(--border); padding: 10px 0; }
        .container { margin: 0 auto; width: 95%; max-width: 1600px; }
        @media (min-width: 1024px) { .container { width: 85%; } }

        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .brand-zone { display: flex; align-items: center; gap: 12px; }
        .logo { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
        h1 { font-size: 1.25rem; font-weight: 800; letter-spacing: -0.02em; }
        .utility-zone { display: flex; align-items: center; gap: 10px; }
        
        .icon-btn { background: none; border: none; color: var(--foreground); cursor: pointer; padding: 6px; opacity: 0.7; }
        .icon-btn:hover { opacity: 1; }
        
        #search-container { display: none; padding: 10px 0; border-top: 1px solid var(--border); margin-top: 10px; }
        .search-box { width: 100%; padding: 10px; border: 1px solid var(--border); background: var(--background); color: var(--foreground); border-radius: var(--radius); outline: none; }

        .controls-row { display: flex; gap: 15px; align-items: center; margin: 20px 0; }
        .select-box { background: var(--muted); border: none; padding: 6px 12px; border-radius: var(--radius); cursor: pointer; font-weight: 600; }
        
        .layout-slider { display: flex; background: var(--muted); padding: 4px; border-radius: var(--radius); cursor: pointer; }
        .layout-btn { padding: 4px 12px; border-radius: var(--radius); font-size: 0.8rem; border: none; background: transparent; color: var(--muted-foreground); }
        .layout-btn.active { background: var(--background); color: var(--foreground); box-shadow: 0 1px 2px rgba(0,0,0,0.1); }

        .filter-accordion { margin-bottom: 20px; }
        .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
        .capsule { background: var(--muted); padding: 4px 12px; border-radius: 99px; cursor: pointer; font-size: 0.8rem; border: none; }
        .capsule.active { background: var(--foreground); color: var(--background); }

        .layout-grid-3 { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 768px) { .layout-grid-3 { grid-template-columns: repeat(3, 1fr); } }
        
        .news-card { display: flex; flex-direction: column; }
        .card-image-wrap { width: 100%; height: 200px; background: var(--muted); border-radius: var(--radius); overflow: hidden; margin-bottom: 10px; }
        .news-image { width: 100%; height: 100%; object-fit: cover; }
        .news-title { font-size: 1.05rem; font-weight: 700; color: var(--foreground); text-decoration: none; }
        .snippet { font-size: 0.85rem; color: var(--muted-foreground); margin: 8px 0; -webkit-line-clamp: 3; display: -webkit-box; -webkit-box-orient: vertical; overflow: hidden; }
        .meta { font-size: 0.75rem; color: var(--muted-foreground); display: flex; justify-content: space-between; }
        
        .hero-card { grid-column: 1 / -1; height: 400px; position: relative; border-radius: var(--radius); overflow: hidden; display: flex; flex-direction: column; justify-content: flex-end; padding: 20px; }
        .hero-full-link { position: absolute; top:0; left:0; width:100%; height:100%; z-index:1; }
        .hero-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(transparent, rgba(0,0,0,0.8)); z-index: 1; }
        .hero-content { position: relative; z-index: 2; color: #fff; }

        .back-to-top { position: fixed; bottom: 30px; right: 30px; background: var(--foreground); color: var(--background); width: 45px; height: 45px; border-radius: 50%; display: none; align-items: center; justify-content: center; z-index: 50; }
        footer { text-align: center; padding: 40px 0; color: var(--muted-foreground); font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="sticky-header">
        <div class="container">
            <header>
                <div class="header-top">
                    <div class="brand-zone">
                        <img src="https://amerhabib.com/wp-content/uploads/2023/03/new_me.jpg" alt="Logo" class="logo">
                        <h1>Amer Habib's News</h1>
                    </div>
                    <div class="utility-zone">
                        <button class="icon-btn" onclick="toggleSearch()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg></button>
                        <button class="icon-btn" onclick="init()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg></button>
                        <button id="theme-btn" class="icon-btn" onclick="toggleTheme()"></button>
                    </div>
                </div>
                <div id="search-container"><input type="text" id="search-box" class="search-box" placeholder="Search..." oninput="handleSearch()"></div>
            </header>
        </div>
    </div>

    <div class="container">
        <div class="controls-row">
            <select id="sort-box" class="select-box" onchange="handleSort()"><option value="newest">Sort: Newest</option><option value="oldest">Sort: Oldest</option></select>
            <div class="layout-slider" onclick="cycleLayout()">
                <button class="layout-btn active" id="layout-label">Layout: Grid 3</button>
            </div>
        </div>

        <details class="filter-accordion"><summary>Categories</summary><div id="filter-container" class="filter-bar"></div></details>
        <div id="news-container" class="layout-grid-3"></div>
        <button id="load-more-btn" class="load-more" onclick="loadMore()">Load More</button>
        <footer>Built with ♥ by Amer Habib</footer>
    </div>
    <button id="back-to-top" class="back-to-top" onclick="window.scrollTo({top:0, behavior:'smooth'})">↑</button>

    <script>
        let globalData = [], filteredData = [], currentDisplayed = 13, currentLayout = 0;
        const layouts = ['grid-3', 'list', 'text'];

        async function init() {
            try {
                const res = await fetch('./data.json?t=' + Date.now());
                const data = await res.json();
                globalData = data.news;
                if(document.getElementById('filter-container').innerHTML === "") {
                    const cats = [...new Set(globalData.map(i => i.category))];
                    document.getElementById('filter-container').innerHTML = `<button class="capsule active" onclick="filterCat('All', this)">All</button>` + 
                        cats.map(c => `<button class="capsule" onclick="filterCat('${c}', this)">${c}</button>`).join('');
                }
                applyFilters();
            } catch(e) { console.error(e); }
        }

        function cycleLayout() {
            currentLayout = (currentLayout + 1) % layouts.length;
            const l = layouts[currentLayout];
            document.getElementById('news-container').className = 'layout-' + l;
            document.getElementById('layout-label').innerText = 'Layout: ' + l.toUpperCase();
            render();
        }

        function filterCat(c, btn) {
            document.querySelectorAll('.capsule').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            filteredData = c === 'All' ? globalData : globalData.filter(i => i.category === c);
            render();
        }

        function applyFilters() { filteredData = globalData; render(); }

        function render() {
            const container = document.getElementById('news-container');
            container.innerHTML = filteredData.slice(0, currentDisplayed).map((item, idx) => {
                if(idx === 0 && layouts[currentLayout] === 'grid-3') return `
                    <div class="hero-card">
                        <a href="${item.link}" target="_blank" class="hero-full-link"></a>
                        <div class="card-image-wrap"><img src="${item.image}" class="news-image"></div>
                        <div class="hero-overlay"></div>
                        <div class="hero-content"><h2>${item.title}</h2><p>${item.snippet}</p></div>
                    </div>`;
                return `
                    <div class="news-card">
                        ${layouts[currentLayout] !== 'text' ? `<div class="card-image-wrap"><img src="${item.image}" class="news-image"></div>` : ''}
                        <div class="news-content">
                            <a class="news-title" href="${item.link}" target="_blank">${item.title}</a>
                            <div class="snippet">${item.snippet}</div>
                            <div class="meta"><span>${new Date(item.pubDate).toLocaleDateString()}</span></div>
                        </div>
                    </div>`;
            }).join('');
        }

        window.onscroll = () => document.getElementById('back-to-top').style.display = window.scrollY > 400 ? 'flex' : 'none';
        init();
    </script>
</body>
</html>
